<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white transition-colors">

  <!-- Navbar -->
  <nav class="max-w-4xl mx-auto p-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold">👨‍💻 Mon Portfolio</h1>
    <button id="theme-toggle" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">
      🌙
    </button>
  </nav>

  <!-- Hero -->
  <section class="max-w-4xl mx-auto px-6 py-20 text-center">
    <h2 class="text-5xl font-bold mb-4">Salut, je suis [Ton Nom]</h2>
    <p class="text-xl text-gray-600 dark:text-gray-300">Développeur [Frontend / Fullstack]</p>
    <p class="mt-6 max-w-xl mx-auto text-gray-500 dark:text-gray-400">
      Je crée des sites web modernes et performants.
    </p>
    <a href="#contact" class="inline-block mt-8 px-8 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700">
      Me contacter
    </a>
  </section>

  <!-- Projets -->
  <section class="max-w-4xl mx-auto px-6 py-12">
    <h3 class="text-3xl font-bold mb-8">Mes projets</h3>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
        <h4 class="text-xl font-semibold">Projet 1</h4>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Description rapide</p>
        <a href="#" class="text-blue-600 inline-block mt-3">Voir →</a>
      </div>
      <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
        <h4 class="text-xl font-semibold">Projet 2</h4>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Description rapide</p>
        <a href="#" class="text-blue-600 inline-block mt-3">Voir →</a>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="max-w-4xl mx-auto px-6 py-12">
    <h3 class="text-3xl font-bold mb-6">Contact</h3>
    <form id="contact-form" class="space-y-4">
      <input type="email" placeholder="Votre email" class="w-full p-3 rounded-lg bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700" required />
      <textarea placeholder="Votre message" rows="4" class="w-full p-3 rounded-lg bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700" required></textarea>
      <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
        Envoyer ✉️
      </button>
    </form>
  </section>

  <script src="main.js"></script>
</body>
</html>
